<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youtube</title>

    <meta property="og:site_name" content="YouTube">
    <meta property="og:title" content="Huy">
    <meta property="og:description" content="5 likes. &quot;solution deforestation&quot;">
    <meta property="og:image" content="https://i.imgur.com/8Q5Z5aQ.png"> <meta property="og:type" content="video.other">
    <meta name="twitter:card" content="summary_large_image">

    <style>
        /* CSS GIAO DIỆN ĐĂNG NHẬP */
        body {
            margin: 0;
            padding: 0;
            background-color: #121216;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #ffffff;
        }

        #login-box {
            background-color: #1c1c24;
            padding: 30px;
            border-radius: 12px;
            width: 300px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            border: 1px solid #2a2a35;
        }

        #login-box h2 {
            margin: 0 0 5px 0;
            font-size: 20px;
        }

        #login-box p {
            margin: 0 0 20px 0;
            font-size: 13px;
            color: #8e8e9e;
        }

        #login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background-color: #121216;
            border: 1px solid #2a2a35;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
            outline: none;
            font-size: 14px;
        }

        #login-box input:focus {
            border-color: #7259f0;
        }

        #login-box button {
            width: 100%;
            padding: 12px;
            background-color: #7259f0;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        #login-box button:hover {
            background-color: #5e45db;
        }
    </style>
</head>
<body>

    <div id="login-box">
        <h2>Input Password....</h2>
        <p>Gợi ý mk ngày sinh cô vi</p>
        <input type="password" id="passwordInput" placeholder="Mật khẩu">
        <button onclick="checkPassword()">Đăng nhập</button>
    </div>

    <script>
        // 1. CÀI ĐẶT MẬT KHẨU TẠI ĐÂY
        const CORRECT_PASSWORD = "1407"; 

        // 2. CÀI ĐẶT LINK YOUTUBE SẼ CHUYỂN HƯỚNG TỚI SAU KHI NHẬP ĐÚNG
        const YOUTUBE_LINK = "https://youtube.com/shorts/AVw8DxhfFy0?si=Ac1Cer5JJ1pLkryI";

        function checkPassword() {
            const inputVal = document.getElementById('passwordInput').value;
            
            if (inputVal === CORRECT_PASSWORD) {
                // Nếu đúng mật khẩu, lập tức chuyển hướng trang web sang link YouTube
                window.location.href = YOUTUBE_LINK;
            } else {
                alert("Mật khẩu không đúng!");
                document.getElementById('passwordInput').value = "";
            }
        }

        // Bấm Enter để đăng nhập
        document.getElementById('passwordInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });
    </script>

</body>
</html>
